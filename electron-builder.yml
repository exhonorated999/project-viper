appId: com.intellect.viper
productName: V.I.P.E.R.
copyright: Copyright © 2025 Intellect LE, LLC
directories:
  output: dist
files:
  - "**/*"
  - "!dist/**"
  - "!plans/**"
  - "!*.md"
  - "!*.txt"
  - "!*.bat"
  - "!*.ps1"
  - "!*.mbox"
  - "!viper-source/**"
  - "!VIPER_*.exe"
  - "!viper-app.exe"
  - "!uninstall.exe"
  - "!aperture-integration-tasks.json"
  - "!test-*.html"
  - "!check-*.html"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  legalTrademarks: Copyright © 2025 Intellect LE, LLC
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: V.I.P.E.R.
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  perMachine: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-Setup.${ext}
portable:
  artifactName: ${productName}-${version}-Portable.${ext}
publish: null
