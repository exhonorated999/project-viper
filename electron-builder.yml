appId: com.intellect.viper
productName: V.I.P.E.R.
copyright: Copyright © 2026 Intellect LE, LLC
directories:
  output: dist
files:
  - "**/*"
  - "!dist/**"
  - "!plans/**"
  - "!tasks/**"
  - "!test/**"
  - "!cases/**"
  - "!viper-source/**"
  - "!*.md"
  - "!*.txt"
  - "!*.bat"
  - "!*.ps1"
  - "!*.mbox"
  - "!VIPER_*.exe"
  - "!viper-app.exe"
  - "!uninstall.exe"
  - "!aperture-integration-tasks.json"
  - "!test-*.html"
  - "!check-*.html"
  - "!.gitignore"
asarUnpack:
  - "build/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  legalTrademarks: Copyright © 2026 Intellect LE, LLC
nsis:
  oneClick: false
  include: build/installer.nsh
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: V.I.P.E.R.
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  perMachine: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-Setup.${ext}
portable:
  artifactName: ${productName}-${version}-Portable.${ext}
publish:
  provider: github
  owner: exhonorated999
  repo: project-viper
  releaseType: release
