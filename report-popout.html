<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Report Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #161921;
            border-bottom: 1px solid rgba(0, 224, 255, 0.15);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            -webkit-app-region: drag;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #00e0ff;
        }
        .header .case-num {
            font-size: 12px;
            color: #64748b;
        }
        .save-btn {
            -webkit-app-region: no-drag;
            background: rgba(0, 224, 255, 0.15);
            border: 1px solid rgba(0, 224, 255, 0.4);
            color: #00e0ff;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .save-btn:hover {
            background: rgba(0, 224, 255, 0.25);
            border-color: rgba(0, 224, 255, 0.6);
        }
        .save-btn.saved {
            background: rgba(74, 222, 128, 0.15);
            border-color: rgba(74, 222, 128, 0.4);
            color: #4ade80;
        }
        .save-btn.unsaved {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.4);
            color: #fbbf24;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .toolbar {
            background: #161921;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }
        .toolbar button {
            background: transparent;
            border: 1px solid transparent;
            color: #94a3b8;
            width: 32px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            color: #e2e8f0;
        }
        .toolbar .sep {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.08);
            margin: 0 6px;
        }
        .toolbar select {
            background: #1e2130;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .editor-wrap {
            flex: 1;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #editor {
            flex: 1;
            background: #1a1d2e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 16px;
            color: #e2e8f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.7;
            overflow-y: auto;
            outline: none;
        }
        #editor:focus {
            border-color: rgba(0, 224, 255, 0.3);
        }
        .footer {
            background: #161921;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #475569;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📝 Report Editor</h1>
            <span class="case-num" id="caseLabel"></span>
        </div>
        <button class="save-btn" id="saveBtn" onclick="saveToMain()">
            💾 Save to Main
        </button>
    </div>

    <div class="toolbar">
        <button onclick="fmt('bold')" title="Bold"><b>B</b></button>
        <button onclick="fmt('italic')" title="Italic"><i>I</i></button>
        <button onclick="fmt('underline')" title="Underline"><u>U</u></button>
        <div class="sep"></div>
        <select onchange="document.execCommand('fontSize', false, this.value); editor.focus();">
            <option value="3">14</option>
            <option value="1">10</option>
            <option value="2">12</option>
            <option value="4">16</option>
            <option value="5">18</option>
            <option value="6">24</option>
        </select>
    </div>

    <div class="editor-wrap">
        <div id="editor" contenteditable="true" spellcheck="true"></div>
    </div>

    <div class="footer">
        <span id="lastSaved">Not yet saved</span>
        <span>Ctrl+S to save</span>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const caseNumber = params.get('case') || '';
        document.getElementById('caseLabel').textContent = `Case ${caseNumber}`;
        document.title = `Report — ${caseNumber}`;

        const editor = document.getElementById('editor');
        const saveBtn = document.getElementById('saveBtn');
        const lastSavedEl = document.getElementById('lastSaved');
        const api = window.electronAPI;
        let hasUnsaved = false;

        function fmt(cmd) { document.execCommand(cmd, false, null); editor.focus(); }

        // Load report from main window on open
        async function loadReport() {
            if (!api || !api.reportGet) return;
            const data = await api.reportGet(caseNumber);
            if (data) {
                editor.innerHTML = data.content || '';
                if (data.lastSaved) {
                    lastSavedEl.textContent = 'Loaded from main: ' + new Date(data.lastSaved).toLocaleString();
                }
            }
        }

        // Save to main window via IPC
        async function saveToMain() {
            if (!api || !api.reportSave) {
                alert('Cannot save — IPC not available');
                return;
            }
            const now = new Date().toISOString();
            const result = await api.reportSave(caseNumber, editor.innerHTML, now);
            if (result) {
                lastSavedEl.textContent = 'Saved to main: ' + new Date(now).toLocaleString();
                lastSavedEl.style.color = '#4ade80';
                saveBtn.textContent = '✅ Saved!';
                saveBtn.className = 'save-btn saved';
                hasUnsaved = false;
                setTimeout(() => {
                    saveBtn.innerHTML = '💾 Save to Main';
                    saveBtn.className = 'save-btn';
                    lastSavedEl.style.color = '';
                }, 2000);
            }
        }

        // Track unsaved changes
        editor.addEventListener('input', () => {
            if (!hasUnsaved) {
                hasUnsaved = true;
                saveBtn.innerHTML = '💾 Save to Main *';
                saveBtn.className = 'save-btn unsaved';
            }
        });

        // Ctrl+S
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveToMain();
            }
        });

        loadReport();
        editor.focus();
    </script>
</body>
</html>
