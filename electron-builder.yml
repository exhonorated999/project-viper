appId: com.intellect.viper
productName: V.I.P.E.R.
copyright: Copyright © 2026 Intellect LE, LLC
directories:
  output: dist
files:
  - "**/*"
  - "!dist/**"
  - "!plans/**"
  - "!tasks/**"
  - "!test/**"
  - "!cases/**"
  - "!sample-data/**"
  - "!viper-source/**"
  - "!*.md"
  - "!*.txt"
  - "!*.bat"
  - "!*.ps1"
  - "!*.mbox"
  - "!VIPER_*.exe"
  - "!viper-app.exe"
  - "!uninstall.exe"
  - "!aperture-integration-tasks.json"
  - "!test-*.html"
  - "!check-*.html"
  - "!.gitignore"
asarUnpack:
  - "build/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  verifyUpdateCodeSignature: false
  legalTrademarks: Copyright © 2026 Intellect LE, LLC
nsis:
  oneClick: false
  include: build/installer.nsh
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: V.I.P.E.R.
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  perMachine: true
  runAfterFinish: true
  # ─────────────────────────────────────────────────────────────────────
  # DATA PRESERVATION POLICY — DO NOT CHANGE TO true.
  #
  # `deleteAppDataOnUninstall: false` ensures electron-builder's generated
  # uninstaller never removes %APPDATA%\<productName>\ (which is where
  # Chromium localStorage, license activation, custom metric flags, and
  # case data live for standard installs).
  #
  # User data may ONLY be deleted from inside the running app via explicit
  # user action. The installer/uninstaller is read-only with respect to
  # user data. See build/installer.nsh for the matching $INSTDIR-side
  # protections covering portable installs.
  # ─────────────────────────────────────────────────────────────────────
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-Setup.${ext}
portable:
  artifactName: ${productName}-${version}-Portable.${ext}
publish:
  provider: github
  owner: exhonorated999
  repo: project-viper
  releaseType: release
