<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Report Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1117;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #161921;
            border-bottom: 1px solid rgba(0, 224, 255, 0.15);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            -webkit-app-region: drag;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #00e0ff;
        }
        .header .case-num {
            font-size: 12px;
            color: #64748b;
        }
        .header .status {
            font-size: 11px;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.25);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .toolbar {
            background: #161921;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }
        .toolbar button {
            background: transparent;
            border: 1px solid transparent;
            color: #94a3b8;
            width: 32px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            color: #e2e8f0;
        }
        .toolbar .sep {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.08);
            margin: 0 4px;
        }
        .toolbar select {
            background: #1e2130;
            color: #94a3b8;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .editor-wrap {
            flex: 1;
            overflow: hidden;
            padding: 0;
        }
        #editor {
            width: 100%;
            height: 100%;
            padding: 20px 24px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: #e2e8f0;
            background: #0f1117;
            border: none;
            outline: none;
            overflow-y: auto;
            resize: none;
        }
        #editor:empty::before {
            content: 'Start typing your report here...';
            color: #4a5568;
        }
        .footer {
            background: #161921;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 6px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #64748b;
            flex-shrink: 0;
        }
        .footer .save-status.saved { color: #4ade80; }
        .footer .save-status.saving { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>📝 Report Editor</h1>
            <span class="case-num" id="caseLabel">Case</span>
        </div>
        <span class="status" id="saveStatus">Synced</span>
    </div>
    <div class="toolbar">
        <button onclick="fmt('bold')" title="Bold"><b>B</b></button>
        <button onclick="fmt('italic')" title="Italic"><i>I</i></button>
        <button onclick="fmt('underline')" title="Underline"><u>U</u></button>
        <div class="sep"></div>
        <select onchange="document.execCommand('fontSize', false, this.value); this.blur();" title="Font Size">
            <option value="3">14</option>
            <option value="1">10</option>
            <option value="2">12</option>
            <option value="4">16</option>
            <option value="5">18</option>
            <option value="6">24</option>
        </select>
    </div>
    <div class="editor-wrap">
        <div id="editor" contenteditable="true"></div>
    </div>
    <div class="footer">
        <span id="lastSaved">Loading...</span>
        <span class="save-status saved" id="syncLabel">● Auto-sync enabled</span>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const caseNumber = params.get('case') || '';
        document.getElementById('caseLabel').textContent = `Case ${caseNumber}`;
        document.title = `Report — ${caseNumber}`;

        const editor = document.getElementById('editor');
        const saveStatus = document.getElementById('saveStatus');
        const lastSavedEl = document.getElementById('lastSaved');
        const syncLabel = document.getElementById('syncLabel');
        const api = window.electronAPI;

        function fmt(cmd) { document.execCommand(cmd, false, null); editor.focus(); }

        // Load report from main window's localStorage via IPC
        async function loadReport() {
            if (!api || !api.reportGet) return;
            const data = await api.reportGet(caseNumber);
            if (data) {
                editor.innerHTML = data.content || '';
                lastKnownSave = data.lastSaved || '';
                if (data.lastSaved) {
                    lastSavedEl.textContent = 'Last saved: ' + new Date(data.lastSaved).toLocaleString();
                }
            }
        }

        // Save report to main window's localStorage via IPC
        async function saveReport() {
            if (!api || !api.reportSave) return;
            const now = new Date().toISOString();
            await api.reportSave(caseNumber, editor.innerHTML, now);
            lastKnownSave = now;
            lastSavedEl.textContent = 'Last saved: ' + new Date(now).toLocaleString();
            saveStatus.textContent = 'Synced';
            saveStatus.style.color = '#4ade80';
            syncLabel.className = 'save-status saved';
        }

        // Auto-save on typing (debounced)
        let saveTimer = null;
        editor.addEventListener('input', () => {
            saveStatus.textContent = 'Unsaved';
            saveStatus.style.color = '#fbbf24';
            syncLabel.className = 'save-status saving';
            clearTimeout(saveTimer);
            saveTimer = setTimeout(saveReport, 800);
        });

        // Ctrl+S manual save
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                clearTimeout(saveTimer);
                saveReport();
            }
        });

        // Poll main window for changes (sync when popout not focused)
        let lastKnownSave = '';
        setInterval(async () => {
            if (document.hasFocus() || !api || !api.reportGet) return;
            const data = await api.reportGet(caseNumber);
            if (data && data.lastSaved && data.lastSaved !== lastKnownSave) {
                lastKnownSave = data.lastSaved;
                editor.innerHTML = data.content || '';
                lastSavedEl.textContent = 'Synced from main: ' + new Date(data.lastSaved).toLocaleString();
            }
        }, 2000);

        loadReport();
        editor.focus();
    </script>
</body>
</html>
